version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: harbor-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: harbor
      POSTGRES_PASSWORD: harbor_dev_password
      POSTGRES_DB: harbor
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
